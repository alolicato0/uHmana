services:
  - type: web
    name: uhmana-api
    runtime: node
    region: frankfurt
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20
      # Settare i seguenti come SECRET nella dashboard Render:
      # MONGODB_URI
      # CLERK_SECRET_KEY
      # CLERK_PUBLISHABLE_KEY
      # OPENROUTER_API_KEY
      - key: OPENROUTER_MODEL_PRIMARY
        value: google/gemini-2.0-flash-exp:free
      - key: OPENROUTER_MODEL_FALLBACK
        value: meta-llama/llama-3.3-70b-instruct:free
      - key: OPENROUTER_MODEL_VISION
        value: google/gemini-2.0-flash-exp:free
      - key: CORS_ORIGINS
        value: "*"
