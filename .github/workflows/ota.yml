name: OTA Update

on:
  workflow_dispatch:
    inputs:
      message:
        description: 'Messaggio update'
        required: false
        default: 'Manual OTA update'
  push:
    branches:
      - main
    paths:
      - 'frontend/**'

jobs:
  ota:
    name: Pubblica OTA update
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Publish EAS Update
        working-directory: frontend
        run: npx eas-cli update --branch production --message "${{ github.event.inputs.message || github.event.head_commit.message }}" --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
