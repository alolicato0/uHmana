name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'Build profile'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
    # Triggera build solo se il commit message contiene [build]
    # (filtrato nello step, GitHub non supporta filtri su messaggio)

jobs:
  build:
    name: EAS Build Android
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[build]') }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Android APK
        working-directory: frontend
        run: npx eas-cli build --platform android --profile ${{ github.event.inputs.profile || 'preview' }} --non-interactive --no-wait
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
